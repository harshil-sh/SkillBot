name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore dependencies
        run: dotnet restore SkillBot.slnx

      - name: Build
        run: dotnet build SkillBot.slnx --no-restore --configuration Release

      - name: Test
        run: dotnet test SkillBot.slnx --no-build --configuration Release --verbosity normal

      - name: Build Docker image
        run: docker build -t skillbot:test .
